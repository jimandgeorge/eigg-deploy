# EIGG edge — terminates TLS (Cloudflare Origin Cert, wildcard *.eigg.io) and routes
# by hostname. Per host: /api/v1 + /health -> that app's backend; everything else
# (pages, NextAuth /api/auth, Prevent admin proxy /api/admin) -> that app's frontend.

upstream prevent_frontend { server prevent_frontend:3001; }
upstream prevent_backend  { server prevent_backend:8001; }
upstream invest_frontend  { server invest_frontend:3000; }
upstream invest_backend   { server invest_backend:8000; }

# HTTP -> HTTPS (Cloudflare also does edge HTTPS; this covers direct hits).
server {
    listen 80 default_server;
    server_name _;
    return 301 https://$host$request_uri;
}

# ── EIGG Prevent ──────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name prevent.eigg.io;

    ssl_certificate     /etc/cloudflare/eigg.io.pem;
    ssl_certificate_key /etc/cloudflare/eigg.io.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    client_max_body_size 25m;

    location /api/v1/ { proxy_pass http://prevent_backend; include /etc/nginx/conf.d/_proxy.inc; }
    location /health  { proxy_pass http://prevent_backend; }
    location /        { proxy_pass http://prevent_frontend; include /etc/nginx/conf.d/_proxy.inc; }
}

# ── EIGG Investigate ───────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name investigate.eigg.io;

    ssl_certificate     /etc/cloudflare/eigg.io.pem;
    ssl_certificate_key /etc/cloudflare/eigg.io.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    client_max_body_size 25m;

    location /api/v1/ { proxy_pass http://invest_backend; include /etc/nginx/conf.d/_proxy.inc; }
    location /health  { proxy_pass http://invest_backend; }
    location /        { proxy_pass http://invest_frontend; include /etc/nginx/conf.d/_proxy.inc; }
}
